<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Guard Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar d-flex flex-column align-items-center">
      <div class="brand-mini text-center">
        <div class="brand-shield mx-auto mb-2"><i class="bi bi-shield-lock-fill"></i></div>
        <div class="brand-mini-text">AUTO GUARD</div>
      </div>

      <nav class="nav-icons mt-5 d-flex flex-column gap-4">
        <button class="nav-circle active" data-view="camera" title="Camera">
          <i class="bi bi-camera-video"></i>
        </button>
        <button class="nav-circle" data-view="metrics" title="Metrics">
          <i class="bi bi-graph-up-arrow"></i>
        </button>
        <button class="nav-circle" data-view="history" title="History">
          <i class="bi bi-file-earmark-text"></i>
        </button>
        <button class="nav-circle" data-view="settings" title="Settings">
          <i class="bi bi-gear"></i>
        </button>
      </nav>
    </aside>

    <main class="main-panel">
      <header class="topbar d-flex justify-content-between align-items-center">
        <h1 class="app-title mb-0">Auto Guard</h1>

        <div class="d-flex align-items-center gap-4 top-actions">
          <button class="alert-lock-btn" aria-label="Security lock">
            <i class="bi bi-lock-fill"></i>
          </button>
          <button id="lockVehicleBtn" class="lock-vehicle-btn">Lock Vehicle</button>
        </div>
      </header>

      <section class="content-area">
        <div id="cameraView" class="view-page active-view">
          <div class="camera-layout row g-4">
            <div class="col-12 col-xl-3">
              <div class="status-stack d-flex flex-column gap-5">
                <div class="status-pill danger">Driver Seat Occupied</div>
                <div class="status-pill success">Driver Door Closed</div>
                <div class="status-pill danger">Driver Window Broken</div>
              </div>
            </div>

            <div class="col-12 col-xl-6">
              <div class="intrusion-frame">
                <div class="intrusion-placeholder">IMAGE OF INTRUSION</div>
              </div>
            </div>

            <div class="col-12 col-xl-3">
              <div class="date-panel">
                <div class="date-text">Friday 13, 2026</div>
              </div>
            </div>
          </div>
        </div>

        <div id="metricsView" class="view-page">
          <div class="metrics-grid">
            <div class="metric-column">
              <div class="gauge-card">
                <div id="tempGauge" class="gauge-canvas"></div>
                <div class="metric-title">Temperature</div>
                <div class="metric-value">24.5</div>
              </div>
              <div class="chart-card">
                <h3>Car Temperature</h3>
                <div id="tempLineChart" class="chart-canvas"></div>
              </div>
            </div>

            <div class="metric-column">
              <div class="gauge-card">
                <div id="humidityGauge" class="gauge-canvas"></div>
                <div class="metric-title">Humidity</div>
                <div class="metric-value">22</div>
              </div>
              <div class="chart-card">
                <h3>Car Humidity</h3>
                <div id="humidityLineChart" class="chart-canvas"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="historyView" class="view-page">
          <div class="row g-4 history-layout">
            <div class="col-12 col-xl-5">
              <div class="history-list-frame">
                <div class="history-list d-flex flex-column gap-3">
                  <button class="history-item active">Intrusion 2/13/2026</button>
                  <button class="history-item">Intrusion 2/12/2026</button>
                  <button class="history-item">Intrusion 2/11/2026</button>
                  <button class="history-item">Intrusion 1/10/2026</button>
                </div>
              </div>
            </div>

            <div class="col-12 col-xl-7">
              <div class="history-detail-wrap d-flex flex-column gap-4">
                <div class="history-image-frame">
                  <div class="intrusion-placeholder">IMAGE OF INTRUSION</div>
                </div>
                <div class="history-info-card">
                  <p>Intrusion 2/13/2026</p>
                  <p>Temperature: 25, Humidity 30</p>
                  <p>Glass Break: Yes</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="settingsView" class="view-page">
          <div class="settings-form d-flex flex-column gap-3">
            <div class="setting-row">
              <label for="smsId">SMS ID:</label>
              <input id="smsId" type="text" value="123-456-7890" />
            </div>
            <div class="setting-row">
              <label for="emailAddress">Email:</label>
              <input id="emailAddress" type="email" value="test@email.com" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
